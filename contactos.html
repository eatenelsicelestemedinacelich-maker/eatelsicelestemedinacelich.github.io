<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K'epi - Contáctanos</title>

    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="misestilos_6.css">

    <style>
        html, body {
            background-color: black !important;
            color: white !important;
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .logo-cabecera {
            height: 55px;
            width: auto;
        }

        .contenido-principal {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .bloque-contacto-izquierdo {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
            max-width: 450px;
            width: 100%;
        }

        .item-contacto {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .icono-red {
            font-size: 3.5rem;
            color: #d11218;
            line-height: 1;
            display: inline-block;
            width: 60px;
            text-align: center;
        }

        .texto-contacto {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.6rem;
            color: #ffffff;
            margin: 0;
        }

        .bloque-contacto-derecho {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2.5rem;
            width: 100%;
            max-width: 450px;
        }

        .titulo-contactos-amarillo {
            font-family: 'Times New Roman', Times, serif;
            font-size: 5rem;
            font-weight: bold;
            color: #f1ca1e;
            letter-spacing: -1px;
            margin: 0;
            text-transform: uppercase;
        }

        .btn-soporte-verde {
            background-color: #00cc22 !important; 
            color: white !important;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.8rem;
            font-weight: normal;
            padding: 1rem 2rem;
            border-radius: 25px !important;
            border: none !important;
            text-align: center;
            text-decoration: none;
            width: 100%;
            max-width: 360px;
            box-shadow: 0px 4px 10px rgba(0, 204, 34, 0.3);
            transition: background-color 0.2s;
        }

        .btn-soporte-verde:hover {
            background-color: #00aa1c !important;
        }

        .footer-franja {
            width: 100%;
            margin-top: auto;
        }

        .franja-img {
            width: 100%;
            height: 42px;
            display: block;
            object-fit: fill;
        }

        @media (max-width: 991px) {
            .bloque-contacto-derecho {
                align-items: center;
                margin-top: 4rem;
            }
            .bloque-contacto-izquierdo {
                margin: 0 auto;
            }
            .titulo-contactos-amarillo {
                font-size: 4rem;
            }
            .texto-contacto {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-black pt-4 pb-2">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="imagenes/200.img.jpg" alt="K'epi" class="logo-cabecera">
            </a>

            <div class="ms-auto">
                <ul class="navbar-nav flex-row gap-4 text-uppercase" style="letter-spacing: 2px; font-size: 0.85rem;">
                    <li class="nav-item">
                        <a class="nav-link text-white-50" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white-50" href="arte.html">Arte en Bolivia</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white-50" href="artistas.html">Artistas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active fw-bold text-white" href="contactos.html">Contáctanos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="contenido-principal container">
        <div class="row w-100 align-items-center justify-content-center m-0">
            
            <div class="col-lg-6 p-0 d-flex justify-content-center justify-content-lg-start">
                <div class="bloque-contacto-izquierdo">
                    
                    <div class="item-contacto">
                        <span class="icono-red"><i class="bi bi-envelope-fill"></i></span>
                        <p class="texto-contacto">K'epi@gmail.com</p>
                    </div>

                    <div class="item-contacto">
                        <span class="icono-red"><i class="bi bi-facebook"></i></span>
                        <p class="texto-contacto">@K'epi.bolivia</p>
                    </div>

                    <div class="item-contacto">
                        <span class="icono-red"><i class="bi bi-tiktok"></i></span>
                        <p class="texto-contacto">@K'epi.bolivia</p>
                    </div>

                    <div class="item-contacto">
                        <span class="icono-red"><i class="bi bi-telephone-fill"></i></span>
                        <p class="texto-contacto">345-6079</p>
                    </div>

                </div>
            </div>

            <div class="col-lg-6 p-0 d-flex justify-content-center justify-content-lg-end">
                <div class="bloque-contacto-derecho">
                    <h1 class="titulo-contactos-amarillo">CONTACTOS</h1>
                    <a href="#" class="btn-soporte-verde">SOPORTE TÉCNICO</a>
                </div>
            </div>

        </div>
    </main>

    <div class="footer-franja">
        <img src="imagenes/201.img.png" alt="Franja Tradicional" class="franja-img">
    </div>

    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
